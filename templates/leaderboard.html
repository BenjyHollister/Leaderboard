<!DOCTYPE html>
<html>
<body>
    <!-- Below is the html logic for the UI of the leaderboard  -->
    <h1>Leaderboard</h1>
    <table border="3">
        <tr>
            <th>Rank</th>
            <th>Name</th>
            <th>Score</th>
        </tr>

        {% for player in leaderboard %}
        <tr>
            <td>{{ player.rank }}</td>
            <td>{{ player.name }}</td>
            <td>{{ player.score }}</td>
        </tr>
        {% endfor %}
    </table>

    <!-- Button container -->
    <div id="button-container" style="margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap;">
        <button onclick="openAddPlayerPopup()" style="padding: 10px 15px;">Add Player</button>
    </div>

    <!-- Add Player popup -->
    <div id="popup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border:1px solid black;">
        <h2>Add Player</h2>

        <form method="POST" action="/add_player">
            <input type="text" name="name">
            <button type="submit">Submit</button>
            <button type="button" onclick="closeAddPlayerPopup()">Cancel</button>
        </form>
    </div>

    <script>
    function openAddPlayerPopup() {
        document.getElementById("popup").style.display = "block";
    }   

    function closeAddPlayerPopup() {
        document.getElementById("popup").style.display = "none";
    }
    </script>
</body>
</html>
